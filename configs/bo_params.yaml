# =============================================================================
# 贝叶斯优化参数配置文件
# 来源: 论文方法部分 2.4
# =============================================================================

# =============================================================================
# 优化器基础参数 (来源: 论文方法部分 2.4)
# =============================================================================

# 优化方法
method: "gp"
# 选项: "gp" (Gaussian Process), "forest" (Random Forest), "gbrt" (Gradient Boosting)
# 来源: scikit-optimize

# 目标函数方向
direction: "minimize"
# 说明: 优化目标是最小化负利润
# 来源: 论文方法部分

# =============================================================================
# 高斯过程参数 (来源: 论文方法部分 2.4.2)
# =============================================================================

# 核函数类型
kernel: "Matern"
# 选项: "RBF", "Matern", "RationalQuadratic", "ExpSineSquared"
# 来源: 论文方法部分

# Matern核的nu参数
kernel_nu: 2.5
# 说明: Matern 5/2 核，平衡光滑性和灵活性
# 来源: 论文方法部分

# 是否使用ARD (Automatic Relevance Determination)
kernel_ard: true
# 说明: 每个维度独立的length scale
# 来源: 论文方法部分

# 高斯过程噪声方差
gp_noise_var: 1.0e-6
# 说明: 观测噪声的方差
# 来源: scikit-optimize 默认

# 是否使用常量均值函数
gp_mean_constant: true
# 说明: 是否在GP中使用常数均值
# 来源: scikit-optimize 默认

# =============================================================================
# 采集函数参数 (来源: 论文方法部分 2.4.3)
# =============================================================================

# 采集函数类型
acquisition: "EI"
# 选项:
#   "LCB": Lower Confidence Bound
#   "EI": Expected Improvement
#   "PI": Probability of Improvement
# 来源: 论文方法部分

# EI的xi参数
ei_xi: 0.01
# 说明: 探索-利用平衡参数，较大的xi促进探索
# 来源: scikit-optimize 默认

# LCB的kappa参数
lcb_kappa: 1.96
# 说明: 置信区间宽度系数
# 来源: scikit-optimize 默认

# 采集函数优化方法
acquisition_optimizer: "lbfgs"
# 说明: 用于最大化采集函数的方法
# 来源: scikit-optimize 默认

# 采集函数优化重复次数
acquisition_optimizer_n_calls: 20
# 说明: 采集函数优化的迭代次数
# 来源: scikit-optimize 默认

# =============================================================================
# 搜索空间定义 (来源: 论文方法部分 2.4.1)
# =============================================================================

# 决策变量空间 (连续范围)
dimensions:
  - name: "t1"
    type: "integer"
    low: 10
    high: 18
    description: "育苗期天数"

  - name: "t2"
    type: "integer"
    low: 18
    high: 26
    description: "定植期天数"

  - name: "rho2"
    type: "continuous"
    low: 20
    high: 80
    description: "定植区种植密度 [株/m²]"

  - name: "A1_A2"
    type: "continuous"
    low: 0.1
    high: 0.9
    description: "育苗区与定植区面积比"

# =============================================================================
# 初始采样 (来源: 论文方法部分 2.4.3)
# =============================================================================

# 初始采样方法
initial_point_generator: "latin_hypercube"
# 选项: "random", "latin_hypercube", "sobol"
# 来源: 论文方法部分

# 初始采样点数量
n_initial_points: 10
# 来源: 论文方法部分

# =============================================================================
# 优化迭代 (来源: 论文方法部分 2.4.3)
# =============================================================================

# 最大迭代次数
n_iter: 40
# 来源: 论文方法部分

# 随机搜索迭代次数 (用于初始化GP)
n_random_starts: 10
# 说明: 在开始贝叶斯优化前，随机评估的点数
# 来源: scikit-optimize 默认

# =============================================================================
# 目标函数评估 (来源: 论文方法部分 2.4.2)
# =============================================================================

# 重复评估次数
n_evaluations: 3
# 说明: 每个排程评估的次数，取平均以减少方差
# 来源: 论文方法部分

# 天气序列类型
weather_type: "TMY"
# 选项: "TMY" (典型气象年), "summer", "winter", "spring"
# 来源: 暂定-需调整

# 仿真时长 [步]
simulation_steps: 8760
# 说明: 全年仿真步数 (1年 = 8760 小时)
# 来源: 论文方法部分

# =============================================================================
# 结果保存 (来源: 论文方法部分)
# =============================================================================

# 是否保存中间结果
save_intermediate: true
# 说明: 每轮迭代后保存当前最优
# 来源: 用户设定

# 是否使用热启动
warm_start: false
# 说明: 是否使用之前的优化结果作为起点
# 来源: 用户设定

# 结果保存路径
results_dir: "results/bo"
# 来源: 用户设定

# =============================================================================
# 约束处理 (来源: 论文方法部分 2.4)
# =============================================================================

# 是否使用物理约束
use_constraints: true
# 说明: 是否在BO中加入物理约束过滤
# 来源: 论文方法部分

# 约束检查函数: 密度约束 rho1_min <= rho1 <= rho1_max
# 由 schedule_params.yaml 中的 rho1_min, rho1_max 定义

# 约束违反时的处理方式
constraint_handling: "penalty"
# 选项:
#   "reject": 拒绝不可行的点，重新采样
#   "penalty": 对不可行的点施加大的惩罚值
#   "project": 投影到最近的可行点
# 来源: 论文方法部分

# 惩罚值 (当 constraint_handling = "penalty" 时)
infeasible_penalty: -1.0e6
# 说明: 不可行点的惩罚值（大的负利润）
# 来源: 用户设定

# 最大重采样次数 (当 constraint_handling = "reject" 时)
max_resampling: 100
# 说明: 达到后停止重采样，接受当前最优点
# 来源: 用户设定

# =============================================================================
# 对比基线 (来源: 论文方法部分 2.4)
# =============================================================================

# 是否运行网格搜索对比
run_grid_search: true
# 说明: 与网格搜索对比收敛速度和最优解
# 来源: 论文方法部分

# 网格搜索分辨率
grid_search_resolution:
  t1: 2  # 每隔2天取一个点
  t2: 2  # 每隔2天取一个点
  rho2: 2  # 取2个密度值
  A1_A2: 0.1  # 每隔0.1取一个比值
# 来源: 暂定-需调整

# =============================================================================
# MPC控制器超参数配置文件
# 用于 plant_factory_optimization 项目的非线性MPC下层控制器
# 对比基准：上下文强化学习 (Contextual RL) 控制方法
# =============================================================================

# =============================================================================
# MPC预测控制参数
# =============================================================================

mpc:
  # 预测时域步数（与仿真环境dt=3600s对应）
  # Np=8: 预测8小时（适合日内实时控制）
  # Np=24: 预测24小时（1个完整光周期）
  Np: 8

  # 时间步长 [秒]（必须与仿真环境一致）
  dt: 3600.0

  # 动作变化率限制（每步最大变化量）
  # 防止求解器产生物理上不可行的剧烈动作变化
  # 这些值在NLP求解中被约束，确保解的平滑性
  action_rate_limit:
    I1: 100.0         # μmol/m²/s per step (光强变化限制)
    I2: 100.0         # μmol/m²/s per step
    Q_HVAC: 53.0      # W/m² per step (约每步25%的最大功率变化)
    u_CO2: 0.125      # g/m²/h per step (25%最大值)
    V_vent: 0.026     # m³/m²/s per step (25%最大值)
    m_dehum: 5.0e-6   # kg/m²/s per step (25%最大值)

  # NLP求解器选项（IPOPT）
  nlp_opts:
    max_iter: 500            # 最大迭代次数
    warm_start: true         # 启用热启动（使用上一步解作为初始猜测）
    tol: 1.0e-4              # 收敛容差
    acceptable_tol: 1.0e-2    # 可接受容差（牺牲精度换取速度）
    constr_viol_tol: 1.0e-2   # 约束违反容差
    print_level: 0           # 输出级别（0=静默）

# =============================================================================
# 软约束边界与惩罚权重
# MPC使用L1软约束惩罚，允许小幅违反约束以确保NLP可求解
# =============================================================================

soft_constraints:
  # CO2浓度软约束
  # 边界单位: kg/m³ (内部计算用)
  # 注意: 约1.0e-3 kg/m³ ≈ 1000 ppm (20°C)
  CO2:
    lb: 4.0e-4     # 约400 ppm [kg/m³]
    ub: 1.1e-3     # 约1100 ppm [kg/m³]
    lb_penalty: 5.0   # 元/kg/m³ 违反惩罚（换算后约5e3元/ppm违反）
    ub_penalty: 5.0
    # 换算参考: 1.0e-3 kg/m³ ≈ 1000 ppm → 惩罚 ≈ 5元/ppm

  # 温度软约束
  temperature:
    lb: 16.0      # °C (略宽于硬约束18-28，作物有一定耐受范围)
    ub: 30.0      # °C
    lb_penalty: 100.0   # 元/°C 违反惩罚
    ub_penalty: 100.0

  # 相对湿度软约束
  RH:
    lb: 0.55      # 55% (略宽于硬约束60-80%)
    ub: 0.85      # 85%
    lb_penalty: 50.0   # 元/1% 违反惩罚
    ub_penalty: 50.0

  # 干物质密度（育苗区）软约束
  # 育苗区xDn非负且不超过xDs
  seedling_dry_matter:
    xDn_min: 0.0       # 非结构干物质下限 [kg/m²]
    xDn_max: 0.3       # 非结构干物质上限 [kg/m²]
    penalty: 100.0     # 元/kg/m² 违反惩罚

  # 干物质密度（定植区）软约束
  transplant_dry_matter:
    xDn_min: 0.0
    xDn_max: 0.3
    xDs_min: 0.001     # 结构干物质下限（防止除零）
    xDs_max: 0.6       # 结构干物质上限 [kg/m²]
    penalty: 100.0

  # 日累积光量（DLI）约束
  # 注意: DLI是次日结束时约束，MPC内滚动预测时近似处理
  dli:
    lb: 8.0      # mol/m²/d (最低要求)
    ub: 17.0     # mol/m²/d (光饱和后收益递减)
    lb_penalty: 10.0   # 元/mol/m²/d 违反惩罚
    ub_penalty: 2.0    # 超出上限惩罚较小

# =============================================================================
# 目标函数经济参数（与奖励函数保持一致）
# =============================================================================

objective:
  # 干物质单价 [元/g]
  # 生长收益 = price_growth * ΔM_total
  price_growth: 0.25

  # 育苗区干物质折算系数
  # 育苗区干物质不直接带来收益，但贡献于后续定植区生长
  # 育苗区收益按此系数折算
  seedling_discount: 0.5

  # 电价 [元/kWh]
  price_energy: 0.6

  # CO2成本 [元/kg]
  price_CO2: 0.5

  # 设备运行成本系数（用于惩罚非必要的高能耗动作）
  # 动作变化惩罚（平滑性惩罚）
  action_change_penalty:
    I1: 0.0         # 光强变化惩罚系数（已有rate limit，此处可设0）
    I2: 0.0
    Q_HVAC: 0.0
    u_CO2: 0.0
    V_vent: 0.0
    m_dehum: 0.0

# =============================================================================
# 设备物理限制（与RL环境及equipment_params.yaml保持一致）
# =============================================================================

equipment_limits:
  # 光强 [μmol/m²/s]
  I1_min: 0.0
  I1_max: 600.0
  I2_min: 0.0
  I2_max: 600.0

  # HVAC功率密度 [W/m²]（正值=加热，负值=制冷）
  Q_HVAC_min: -212.0
  Q_HVAC_max: 212.0

  # CO2注入速率 [g/m²/h]
  u_CO2_min: 0.0
  u_CO2_max: 0.5

  # 通风率 [m³/m²/s]
  V_vent_min: 0.0
  V_vent_max: 0.1042

  # 除湿速率 [kg/m²/s]
  m_dehum_min: 0.0
  m_dehum_max: 2.083e-5

# =============================================================================
# 作物模型参数（与crop_params.yaml保持一致）
# 这些参数会被复制到CasADi符号模型中
# =============================================================================

crop_params:
  c_alpha: 0.68
  c_beta: 0.8
  c_Gamma: 7.32e-5
  c_Q10_Gamma: 2.0
  c_k: 0.9
  c_lar_s: 75.0
  c_tau: 0.07
  c_eps: 1.7e-8
  c_par: 1.0
  c_Q10_resp: 2.0
  c_resp_s: 3.47e-7
  c_resp_r: 1.16e-7
  c_r_gr_max: 5.0e-6
  c_Q10_gr: 1.6
  c_bnd: 0.004
  c_stm: 0.007
  c_car_1: -1.32e-5
  c_car_2: 5.94e-4
  c_car_3: -2.64e-3

# =============================================================================
# 容器模型参数（与container_params.yaml保持一致）
# =============================================================================

container_params:
  c_volume: 91.5
  c_cap_q: 30000.0
  c_cap_q_v: 1290.0
  c_surface_area: 143.2
  c_U: 0.3
  c_lat_water: 2256.4
  c_v_0: 0.85
  c_v_1: 611.0
  c_v_2: 17.4
  c_v_3: 239.0
  mw_water: 18.0
  c_R: 8314.0
  c_T_abs: 273.0
  c_a_pl: 62.8
  c_v_pl_ai: 0.0036
  c_optical_eff: 2.5
  c_led_eff: 0.52
  c_total_plant_area: 40.0

# =============================================================================
# 外部环境参数（用于MPC扰动预测）
# 典型值作为基准，仿真时可被覆盖
# =============================================================================

external:
  # 夏季典型外部条件
  T_out_summer: 20.15      # °C
  RH_out_summer: 0.8      # [-]
  C_out_summer_ppm: 400.0 # ppm

  # 冬季典型外部条件
  T_out_winter: -4.25     # °C
  RH_out_winter: 0.86     # [-]

  # 电价 [元/kWh]
  elec_price_base: 0.6
  elec_price_min: 0.3
  elec_price_max: 1.0

# =============================================================================
# MPC状态估计器参数
# MPC使用简化的状态估计（假设完美观测）
# 实际部署时可替换为Kalman Filter等估计器
# =============================================================================

state_estimation:
  # 假设完美观测（与RL环境一致）
  perfect_observation: true

  # 状态扰动标准差（用于鲁棒MPC/随机MPC扩展）
  disturbance_std:
    xDn1: 0.0     # 非结构干物质 [kg/m²]
    xDs1: 0.0     # 结构干物质 [kg/m²]
    xDn2: 0.0
    xDs2: 0.0
    C: 1.0e-5     # CO2密度 [kg/m³]
    T: 0.5        # 温度 [°C]
    RH: 0.02      # 相对湿度 [-]
    dLI1: 0.0     # DLI累计 [mol/m²]
    dLI2: 0.0

# =============================================================================
# 仿真实验配置
# =============================================================================

experiment:
  # 默认测试排程参数
  default_schedule:
    t1: 14          # 育苗期 [天]
    t2: 21          # 定植期 [天]
    rho2: 35.0      # 定植区密度 [株/m²]
    A1_A2: 0.5      # 面积比

  # 对比实验设置
  comparison:
    n_mpc_runs: 3          # MPC独立运行次数
    n_rl_eval_episodes: 3  # RL评估episodes数
    save_trajectories: true # 保存完整轨迹
    save_dir: "results/mpc_comparison"

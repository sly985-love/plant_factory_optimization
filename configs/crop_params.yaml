# =============================================================================
# 作物模型参数配置文件
# 来源: 基于 Van Henten 1994 "A greenhouse model with seasonal daylight"
#       以及 PFAL-DRL 项目中的参数设置
# =============================================================================

# =============================================================================
# 光合作用参数 (来源: Van Henten 1994)
# =============================================================================

# 光合效率因子 [-]
# 说明: CO2同化效率的关键参数
c_alpha: 0.68
# 来源: Van Henten 1994

# CO2补偿点系数 [-]
# 说明: 光合作用中CO2固定与呼吸释放的分配系数
c_beta: 0.8
# 来源: Van Henten 1994

# CO2补偿点基准值 [kg/m³]
# 说明: 光合作用CO2补偿点，温度修正的基准值
c_Gamma: 7.32E-5
# 来源: Van Henten 1994

# 光衰减系数 (Beer-Lambert定律) [-]
# 说明: 光在冠层中的衰减系数
c_k: 0.9
# 来源: Van Henten 1994

# 比叶面积 [m²/kg]
# 说明: 单位干物质对应的叶面积
c_lar_s: 75.0
# 来源: Van Henten 1994

# 光合辐射占有效辐射的比例 [-]
# 说明: LED发出的光中用于光合作用的比例
c_par: 1.0
# 来源: Van Henten 1994 (假设全部为PAR)

# 辐射比例因子 [-]
# 说明: 光合计算中的辐射利用因子
c_rad_rf: 1.0
# 来源: PFAL-DRL

# 光合有效辐射转化系数 [kg/J]
# 说明: 辐射能转化为CO2固定的效率
c_eps: 1.7E-8
# 来源: Van Henten 1994 (原文为17E-9，调整为与PFAL-DRL一致)

# =============================================================================
# 呼吸作用参数 (来源: Van Henten 1994)
# =============================================================================

# Q10温度响应系数 (呼吸) [-]
# 说明: 温度每升高10°C呼吸速率增加的倍数
c_Q10_resp: 2.0
# 来源: Van Henten 1994

# 茎/叶维持呼吸系数 [1/s]
# 说明: 单位结构干物质的维持呼吸速率
c_resp_s: 3.47E-7
# 来源: Van Henten 1994

# 根维持呼吸系数 [1/s]
# 说明: 根组织的维持呼吸速率（相对于茎/叶）
c_resp_r: 1.16E-7
# 来源: Van Henten 1994

# =============================================================================
# 生长动力学参数 (来源: Van Henten 1994, 部分暂定)
# =============================================================================

# 最大相对生长率 [1/s]
# 说明: 理想条件下的最大相对生长速率
# 注: PFAL-DRL中设为5E-6，此处采用该值
c_r_gr_max: 5.0E-6
# 来源: PFAL-DRL暂定 (Van Henten 1994中未直接给出)

# Q10温度响应系数 (生长) [-]
# 说明: 温度对相对生长率的Q10效应
c_Q10_gr: 1.6
# 来源: Van Henten 1994

# Q10温度响应系数 (Gamma) [-]
# 说明: CO2补偿点的温度敏感性
c_Q10_Gamma: 2.0
# 来源: PFAL-DRL暂定

# 分配系数 [-]
# 说明: 非结构干物质分配给结构干物质的比例
# 注: 原Van Henten论文为0.15，PFAL-DRL调整为0.07
c_tau: 0.07
# 来源: PFAL-DRL调整

# =============================================================================
# 气孔与叶肉导度参数 (来源: Van Henten 1994, 部分暂定)
# =============================================================================

# 边界层导度 [m/s]
# 说明: 叶表面边界层对CO2的导度
c_bnd: 0.004
# 来源: PFAL-DRL暂定

# 气孔导度 [m/s]
# 说明: 气孔对CO2的导度
c_stm: 0.007
# 来源: Van Henten 1994

# 叶肉导度温度修正系数1 [m/s/°C²]
# 说明: 叶肉导度二次项系数
c_car_1: -1.32E-5
# 来源: Van Henten 1994

# 叶肉导度温度修正系数2 [m/s/°C]
# 说明: 叶肉导度一次项系数
c_car_2: 5.94E-4
# 来源: Van Henten 1994

# 叶肉导度温度修正系数3 [m/s]
# 说明: 叶肉导度常数项
c_car_3: -2.64E-3
# 来源: Van Henten 1994

# =============================================================================
# 干物质与鲜重转换参数 (来源: 暂定)
# =============================================================================

# 干物质转鲜重系数 [-]
# 说明: 鲜重与干重之比，用于估算采收量
c_fw: 22.5
# 来源: PFAL-DRL暂定

# 干物质转燃料系数 [-]
# 说明: 干物质转化为最终产品的效率
c_d2f: 0.04
# 来源: PFAL-DRL暂定

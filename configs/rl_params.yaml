# =============================================================================
# PPO强化学习超参数配置文件
# 来源: 基于论文方法部分 2.3.4，以及 stable-baselines3 默认值
# =============================================================================

# =============================================================================
# 算法基础参数 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 算法类型
algorithm: "PPO"
# 来源: 论文方法部分

# 总训练步数
total_timesteps: 5000000
# 说明: 5 x 10^6 步
# 来源: 论文方法部分

# =============================================================================
# PPO网络结构 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 策略网络隐藏层大小
policy_net_arch: [256, 256]
# 来源: 论文方法部分

# 价值网络隐藏层大小
value_net_arch: [256, 256]
# 来源: 论文方法部分

# 激活函数
activation_fn: "ReLU"
# 来源: 论文方法部分

# =============================================================================
# PPO优化器参数 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 学习率
learning_rate: 3.0e-4
# 来源: 论文方法部分

# 优化器类型
optimizer: "Adam"
# 来源: stable-baselines3 默认

# =============================================================================
# PPO算法参数 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 折扣因子 gamma
gamma: 0.99
# 来源: 论文方法部分

# GAE参数 lambda
gae_lambda: 0.95
# 来源: 论文方法部分

# PPO裁剪参数 epsilon
clip_range: 0.2
# 来源: 论文方法部分

# 熵系数 (用于探索)
ent_coef: 0.01
# 来源: 论文方法部分

# 值函数系数
vf_coef: 0.5
# 说明: 价值函数损失权重
# 来源: stable-baselines3 默认

# 最大梯度范数
max_grad_norm: 0.5
# 说明: 梯度裁剪阈值
# 来源: stable-baselines3 默认

# =============================================================================
# 训练批次参数 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 每次更新的批量大小
batch_size: 2048
# 来源: 论文方法部分

# 每次更新重复的轮数
n_epochs: 10
# 来源: 论文方法部分

# 每回合最大步数
n_steps: 2048
# 说明: 收集多少步后进行一次更新
# 来源: 论文方法部分

# =============================================================================
# 并行环境参数 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 并行环境数量
n_envs: 16
# 来源: 论文方法部分

# =============================================================================
# 验证参数 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 验证频率 [步]
eval_freq: 100000
# 说明: 每隔多少步进行一次验证
# 来源: 论文方法部分

# 验证环境数量
n_eval_episodes: 10
# 说明: 验证时运行的回合数
# 来源: 论文方法部分

# 验证排程数量
n_eval_schedules: 10
# 说明: 从验证集中采样的排程数量
# 来源: 论文方法部分

# 验证天气数量
n_eval_weather: 3
# 说明: 每个排程评估的天气序列数
# 来源: 论文方法部分

# =============================================================================
# 回合定义 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 回合长度模式
episode_length_mode: "transplant_cycle"
# 选项:
#   "transplant_cycle": 一个定植期长度 (t2 * 24 步)
#   "fixed": 固定步数
#   "full_year": 全年 (8760 步)
# 来源: 论文方法部分

# 固定回合长度 (当 episode_length_mode = "fixed" 时)
fixed_episode_length: 3025
# 说明: 与 PFAL-DRL 单生长周期一致
# 来源: PFAL-DRL

# =============================================================================
# 上下文强化学习参数 (来源: 论文方法部分 2.3)
# =============================================================================

# 上下文是否包含上一步动作
context_include_prev_action: true
# 来源: 论文方法部分

# 上下文归一化方式
context_normalization: "linear"
# 选项: "linear", "minmax", "standardize"
# 来源: 论文方法部分

# =============================================================================
# 采样策略 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 排程采样方法
schedule_sampling: "latin_hypercube"
# 选项: "latin_hypercube", "random", "grid"
# 来源: 论文方法部分

# 天气采样方法
weather_sampling: "random_tmy"
# 选项: "random_tmy", "fixed_tmy", "specific_year"
# 来源: 论文方法部分

# =============================================================================
# 训练稳定性参数 (来源: stable-baselines3)
# =============================================================================

# 学习率衰减
use_linear_lr_decay: false
# 说明: 是否使用线性学习率衰减
# 来源: stable-baselines3

# 梯度归一化
clip_range_vf: null
# 说明: 值函数裁剪，null表示不裁剪
# 来源: stable-baselines3

# 早停参数
early_stopping: false
# 说明: 是否使用早停
# 来源: stable-baselines3

# 早停耐心值
early_stopping_patience: 20
# 说明: 连续多少次评估无提升后停止
# 来源: stable-baselines3

# =============================================================================
# 随机种子 (来源: 用户设定)
# =============================================================================

# 全局随机种子
seed: 42
# 说明: 确保实验可复现
# 来源: 用户设定

# numpy随机种子
numpy_seed: 42
# 来源: 用户设定

# PyTorch随机种子
torch_seed: 42
# 来源: 用户设定

# =============================================================================
# WandB日志参数 (来源: 论文方法部分)
# =============================================================================

# 是否使用WandB
use_wandb: true
# 说明: 训练过程记录到 WandB
# 来源: 论文方法部分

# WandB项目名称
wandb_project: "plant_factory_optimization"
# 来源: 用户设定

# WandB实验名称
wandb_run_name: "contextual_ppo"
# 来源: 用户设定

# WandB日志频率
wandb_log_interval: 1000
# 说明: 每隔多少步记录一次
# 来源: 用户设定

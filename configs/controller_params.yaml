# =============================================================================
# 控制器参数配置文件
# 来源: 论文方法部分 2.5，所有参数均非硬编码
# =============================================================================

# =============================================================================
# 规则控制器参数 (来源: 论文方法部分 2.5 基线对比方法)
# =============================================================================

rule_controller:
  # 光照参数
  light_intensity: 200.0  # μmol/m²/s
  light_on_hour: 8   # 光期开始小时 [0-23]
  light_off_hour: 24  # 光期结束小时 [0-23] (24表示到0点)

  # 温度控制参数
  temp_setpoint: 22.0  # °C 目标温度
  kp_temp: 10.0  # 温度P增益 [W/m²/°C]
  temp_deadband: 1.0  # 温度死区 [°C]

  # CO2控制参数
  co2_setpoint: 1000.0  # ppm 目标CO2浓度
  co2_low_threshold: 800.0  # ppm 低于此值注入
  co2_high_threshold: 1200.0  # ppm 高于此值停止
  co2_injection_rate: 0.2  # g/m²/h 注入速率

  # 通风控制参数
  vent_rate: 0.25  # 中值通风率 [m³/m²/s]
  vent_high_threshold: 0.4  # 高值通风率 [m³/m²/s]
  vent_trigger_co2: 1200.0  # ppm CO2触发高通风
  vent_trigger_temp: 25.0  # °C 温度触发高通风

  # 除湿控制参数
  dehum_rate: 0.001  # 中值除湿速率 [kg/m²/s]
  dehum_high_rh: 0.80  # 触发除湿RH阈值
  dehum_mid_rh: 0.75   # 中等除湿RH阈值
  dehum_max_rate: 0.002  # 最大除湿速率 [kg/m²/s]

# =============================================================================
# PID控制器参数 (备用)
# =============================================================================

pid_controller:
  temp_setpoint: 22.0  # °C
  kp: 20.0  # P增益
  ki: 0.5   # I增益
  kd: 5.0   # D增益
  # 其他动作同RuleController

# =============================================================================
# 通用动作空间限制 (用于所有控制器)
# =============================================================================

action_limits:
  # 光强
  I_max: 600.0  # μmol/m²/s
  I_min: 0.0    # μmol/m²/s

  # HVAC
  Q_HVAC_max: 212.0  # W/m²
  Q_HVAC_min: -212.0  # W/m²

  # CO2注入
  co2_supply_max: 0.5  # g/m²/h
  co2_supply_min: 0.0  # g/m²/h

  # 通风
  vent_max: 0.5  # m³/m²/s
  vent_min: 0.0  # m³/m²/s

  # 除湿
  dehum_max: 0.002  # kg/m²/s
  dehum_min: 0.0  # kg/m²/s

# =============================================================================
# 奖励函数参数配置文件
# 来源: 基于论文方法部分定义，所有参数均非硬编码
# =============================================================================

# =============================================================================
# 生长收益参数 (来源: 论文方法部分)
# =============================================================================

# 干物质单价 [元/g]
# 说明: 每克干物质增加的收益
# MPC模型键名: price_growth
alpha_growth: 0.25

# MPC模型专用经济参数（用于NLP目标函数）
price_growth: 0.25     # 干物质单价 [元/g]
price_energy: 0.6      # 电价 [元/kWh]
price_CO2: 0.5         # CO2成本 [元/kg]

# 来源: 暂定-需调整

# 育苗区生长收益折算系数 [-]
# 说明: 育苗区干物质增量的收益折算（因为最终采收来自定植区）
seedling_growth_discount: 0.5
# 来源: 暂定-需调整

# =============================================================================
# 能耗成本参数 (来源: 论文方法部分)
# =============================================================================

# CO2成本 [元/kg]
p_CO2_cost: 0.5
# 说明: CO2注入的单位成本
# 来源: 暂定-需调整

# =============================================================================
# 硬约束惩罚参数 (来源: 论文方法部分)
# =============================================================================

# 采收不达标惩罚 [元]
# 说明: 当采收时干物质 < 25 g 时的惩罚
harvest_fail_penalty: -200.0
# 来源: 论文方法部分

# 移栽不达标惩罚 [元]
# 说明: 当移栽时干物质 < 5 g 时的惩罚
transplant_fail_penalty: -100.0
# 来源: 论文方法部分

# 温度越限惩罚 [元/步]
# 说明: 温度超出 [18, 28]°C 范围时每步的惩罚
temp_violation_penalty: -10.0
# 来源: 论文方法部分

# 暗期不足惩罚 [元/步]
# 说明: 连续暗期 < 4 小时时的惩罚
dark_period_penalty: -10.0
# 来源: 论文方法部分

# 最小连续暗期 [小时]
min_dark_period_hours: 4.0
# 来源: 论文方法部分

# =============================================================================
# 软约束惩罚参数 (来源: 论文方法部分)
# =============================================================================

# DLI偏离惩罚 [元/(mol/m²)]
# 说明: 日累积光量偏离 [8, 15] mol/m²/d 时，每偏离1单位的惩罚
dli_deviation_penalty: -1.0
# 说明: 在每日结束时结算
# 来源: 论文方法部分

# 光照突变惩罚系数 [-]
# 说明: 光强变化平方项的惩罚系数
# 公式: -beta * sum((I_i - I_i_prev)^2)
light_change_penalty_coef: 0.001
# 来源: 论文方法部分

# 湿度偏离惩罚 [元/(%/步)]
# 说明: 相对湿度偏离 [60, 80]% 范围时，每偏离1%的惩罚
rh_deviation_penalty: -0.1
# 来源: 论文方法部分

# =============================================================================
# 约束范围参数 (来源: 论文方法部分)
# =============================================================================

# 温度硬约束范围 [°C]
temp_hard_min: 18.0
temp_hard_max: 28.0
# 来源: 论文方法部分

# 湿度软约束范围 [%]
rh_soft_min: 60.0
rh_soft_max: 80.0
# 来源: 暂定-需调整

# DLI目标范围 [mol/m²/d]
dli_target_min: 8.0
dli_target_max: 15.0
# 来源: 论文方法部分

# CO2浓度约束范围 [ppm]
co2_min: 400.0
co2_max: 1200.0
# 来源: 基于PFAL-DRL外部CO2浓度

# 采收达标干物质阈值 [g]
harvest_min_dry_mass: 25.0
# 来源: 论文方法部分

# 移栽达标干物质阈值 [g]
transplant_min_dry_mass: 5.0
# 来源: 论文方法部分

# =============================================================================
# 奖励缩放参数 (来源: 论文方法部分)
# =============================================================================

# 奖励缩放因子
# 说明: 用于归一化不同量级的奖励项
reward_scale_factor: 100.0
# 说明: 将奖励除以此因子后再返回
# 来源: PFAL-DRL参考

# =============================================================================
# 奖励组成权重 (来源: 论文方法部分)
# =============================================================================

# 生长收益权重
weight_growth: 1.0
# 来源: 论文方法部分

# 能耗成本权重
weight_cost: 1.0
# 来源: 论文方法部分

# 约束惩罚权重
weight_penalty: 1.0
# 来源: 论文方法部分

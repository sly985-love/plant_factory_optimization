# =============================================================================
# 排程参数空间配置文件
# 来源: 论文方法部分，所有参数均非硬编码
# =============================================================================

# =============================================================================
# 上层决策变量定义 (来源: 论文方法部分 2.1)
# =============================================================================

# 育苗期时长 t1 范围 [天]
# 说明: 整数变量，取值范围可根据品种生理特性设定
t1_min: 10
t1_max: 18
# 来源: 论文方法部分

# 定植期时长 t2 范围 [天]
# 说明: 整数变量，取值范围可根据品种生理特性设定
t2_min: 18
t2_max: 26
# 来源: 论文方法部分

# 总周期约束 [天]
# 说明: t1 + t2 需在合理范围内
total_cycle_min: 30
total_cycle_max: 40
# 来源: 暂定-需调整

# =============================================================================
# 连续变量定义 (来源: 论文方法部分 2.1, 2.4)
# =============================================================================

# 定植区种植密度 ρ2 范围 [株/m²]
# 说明: 由实际生产中标准托盘的固定孔位决定，此处给出连续搜索范围
# 用于贝叶斯优化等需要连续空间的算法
# 实际离散选择应在 bo_rho2_typical_values 中指定典型值
rho2_min: 20
rho2_max: 80
# 来源: 论文方法部分 2.4.1

# 育苗区与定植区面积比 A1/A2 范围 [-]
# 说明: 由集装箱内栽培架的模块化结构决定
# 注意: A1/A2 = A1_A2，当 A1_A2 > 1 时表示育苗区面积大于定植区
A1_A2_min: 0.1
A1_A2_max: 5.0
# 来源: 论文方法部分 2.4.1

# 典型离散密度值（实际生产中常用的托盘孔位密度）
# 【重要】这只是典型参考值，不是唯一选择。实际排程可在 rho2_min ~ rho2_max 内任意选择
bo_rho2_typical_values: [25, 35, 45, 60]
# 来源: 论文方法部分（典型参考值）

# 典型面积比离散值（便于快速选择固定比例）
bo_A1_A2_typical_values:
  - [0.125, 1, 8]   # 1/8
  - [0.143, 1, 7]   # 1/7
  - [0.167, 1, 6]   # 1/6
  - [0.200, 1, 5]   # 1/5
  - [0.250, 1, 4]   # 1/4
  - [0.333, 1, 3]   # 1/3
  - [0.500, 1, 2]   # 1/2
  - [1.000, 1, 1]   # 1/1
  - [2.000, 2, 1]   # 2/1
  - [3.000, 3, 1]   # 3/1
  - [4.000, 4, 1]   # 4/1
  - [5.000, 5, 1]   # 5/1
# 说明: 格式 [A1/A2, A1_units, A2_units]
# 来源: 可根据实际架子配置调整

# 总面积固定 [m²]
A_total: 40.0
# 说明: 育苗区 + 定植区 = 40 m²
# 来源: 用户设定

# =============================================================================
# 密度约束参数 (来源: 论文方法部分 2.2.1)
# =============================================================================

# 育苗区密度 ρ1 下限 [株/m²]
# 说明: 生理可行范围下限
rho1_min: 30
# 来源: 论文方法部分 (可调)

# 育苗区密度 ρ1 上限 [株/m²]
# 说明: 生理可行范围上限
rho1_max: 60
# 来源: 论文方法部分 (可调)

# =============================================================================
# 贝叶斯优化搜索空间 (来源: 论文方法部分 2.4)
# =============================================================================

# BO连续搜索范围 (用于高斯过程建模)
# 说明: 将离散变量视为连续变量进行搜索
bo_continuous_bounds:
  t1: [10, 18]
  t2: [18, 26]
  rho2: [20, 80]
  A1_A2: [0.1, 5.0]
# 来源: 论文方法部分 2.4.1

# =============================================================================
# 贝叶斯优化配置参数 (来源: 论文方法部分 2.4.3)
# =============================================================================

# 高斯过程核函数
gp_kernel: "Matern"
# 选项: "Matern", "RBF", "ExpSineSquared"
# 来源: 论文方法部分

# Matern核的nu参数
gp_kernel_nu: 2.5
# 说明: Matern 5/2 核
# 来源: 论文方法部分

# 初始拉丁超立方采样点数
bo_initial_points: 10
# 来源: 论文方法部分

# BO迭代次数
bo_iterations: 40
# 来源: 论文方法部分

# 采集函数
acquisition_function: "EI"
# 选项: "EI" (期望改进), "PI" (概率改进), "LCB" (置信下界)
# 来源: 论文方法部分

# 目标函数评估重复次数
objective_repeats: 3
# 说明: 对每个排程运行全年仿真的次数，取平均
# 来源: 论文方法部分

# 目标函数评估的天气序列
objective_weather: "TMY"
# 选项: "TMY" (典型气象年), "specific_year"
# 来源: 暂定-需调整

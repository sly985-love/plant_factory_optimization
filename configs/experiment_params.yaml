# =============================================================================
# 实验配置参数文件
# 来源: 论文方法部分 2.7，以及用户自定义
# =============================================================================

# =============================================================================
# 天气数据配置 (来源: 论文方法部分)
# =============================================================================

# 天气数据目录
weather_data_dir: "data/weather"
# 来源: 用户设定

# 典型气象年数据文件
tmy_data_file: "outdoorWeatherWurGlas2014.csv"
# 说明: 来源于 RL-SMPC 项目
# 来源: RL-SMPC

# 训练天气数据目录
train_weather_dir: "weather/train"
# 说明: KNMI年份数据
# 来源: RL-SMPC

# 天气数据采样间隔 [秒]
weather_sample_interval: 1800
# 说明: 30分钟采样一次
# 来源: RL-SMPC

# 天气数据起始列
weather_columns:
  time: 0      # 时间 [天]
  radiation: 1 # 太阳辐射 [W/m²]
  temperature: 2 # 温度 [°C]
  humidity: 3   # 相对湿度 [%]
  wind_speed: 4 # 风速 [m/s] (未使用)
  co2: 5       # CO2浓度 [ppm]
# 来源: RL-SMPC

# =============================================================================
# 电价配置 (来源: 论文方法部分)
# =============================================================================

# 电价模型类型
price_model_type: "time_of_use"
# 选项:
#   "constant": 固定电价
#   "time_of_use": 分时电价
#   "real_time": 实时电价 (需额外数据)
# 来源: 暂定-需调整

# 分时电价时段 [小时]
time_of_use_periods:
  peak: [8, 11, 18, 21]  # 峰时
  off_peak: [6, 7, 12, 17, 22, 23]  # 平时
  valley: [0, 1, 2, 3, 4, 5, 13, 14, 15, 16, 24]  # 谷时
# 来源: 暂定-需调整 (根据当地电价政策)

# 分时电价 [元/kWh]
time_of_use_prices:
  peak: 1.0
  off_peak: 0.6
  valley: 0.3
# 来源: 暂定-需调整

# 固定电价 [元/kWh]
constant_price: 0.6
# 来源: 暂定-需调整

# 电价归一化参数 (用于观测空间)
elec_price_normalization:
  min: 0.3
  max: 1.0
# 来源: 论文方法部分

# =============================================================================
# 仿真参数 (来源: 论文方法部分)
# =============================================================================

# 仿真步长 [秒]
simulation_step: 3600
# 说明: 1小时一步，与全年8760步对应
# 来源: 论文方法部分

# 全年步数
steps_per_year: 8760
# 说明: 24 * 365 = 8760
# 来源: 论文方法部分

# 每天步数
steps_per_day: 24
# 说明: 每小时一步
# 来源: 论文方法部分

# 光周期设置
photoperiod:
  light_hours: 16
  dark_hours: 8
# 来源: 论文方法部分

# =============================================================================
# 实验设置 (来源: 论文方法部分 2.7)
# =============================================================================

# 全局随机种子
global_seed: 42
# 来源: 用户设定

# 实验重复次数
n_experiment_repeats: 3
# 说明: 独立实验重复次数
# 来源: 暂定-需调整

# 评估天气重复次数
n_weather_repeats: 3
# 说明: 每种排程在不同天气下的评估次数
# 来源: 论文方法部分

# =============================================================================
# 验证集定义 (来源: 论文方法部分 2.3.4)
# =============================================================================

# 固定验证排程 (用于评估泛化性能)
fixed_eval_schedules:
  - name: "schedule_1"
    t1: 12
    t2: 20
    rho2: 35
    A1_A2: 0.5
  - name: "schedule_2"
    t1: 14
    t2: 21
    rho2: 45
    A1_A2: 0.4
  - name: "schedule_3"
    t1: 16
    t2: 24
    rho2: 60
    A1_A2: 0.6
  - name: "schedule_4"
    t1: 10
    t2: 18
    rho2: 25
    A1_A2: 0.333
  - name: "schedule_5"
    t1: 18
    t2: 26
    rho2: 45
    A1_A2: 0.5
  - name: "schedule_6"
    t1: 12
    t2: 22
    rho2: 35
    A1_A2: 0.667
  - name: "schedule_7"
    t1: 14
    t2: 24
    rho2: 60
    A1_A2: 0.4
  - name: "schedule_8"
    t1: 16
    t2: 20
    rho2: 45
    A1_A2: 0.5
  - name: "schedule_9"
    t1: 10
    t2: 26
    rho2: 35
    A1_A2: 0.5
  - name: "schedule_10"
    t1: 18
    t2: 18
    rho2: 60
    A1_A2: 0.5
# 说明: 10个固定验证排程
# 来源: 论文方法部分

# 固定验证天气
fixed_eval_weather:
  - name: "summer"
    start_day: 180  # 7月前后
    duration_days: 30
  - name: "winter"
    start_day: 0  # 1月前后
    duration_days: 30
  - name: "spring"
    start_day: 90  # 4月前后
    duration_days: 30
# 来源: 论文方法部分

# =============================================================================
# 消融实验配置 (来源: 论文方法部分 2.7)
# =============================================================================

# 消融实验列表
ablation_experiments:
  - name: "no_context"
    description: "移除上下文，训练单一策略"
    config:
      use_context: false

  - name: "harvest_only"
    description: "仅采收奖励，无中间奖励"
    config:
      reward_type: "harvest_only"

  - name: "no_price_awareness"
    description: "固定电价，无电价感知"
    config:
      price_awareness: false

  - name: "fixed_vent_dehum"
    description: "固定通风和除湿为中值"
    config:
      fixed_vent_dehum: true

# 来源: 论文方法部分

# =============================================================================
# 敏感性分析配置 (来源: 论文方法部分 2.7)
# =============================================================================

# 敏感性分析参数
sensitivity_params:
  - name: "electricity_price"
    base_value: 0.6
    variations: [0.3, 0.45, 0.6, 0.75, 0.9, 1.0]

  - name: "co2_price"
    base_value: 0.5
    variations: [0.25, 0.375, 0.5, 0.625, 0.75]

  - name: "crop_price"
    base_value: 0.25
    variations: [0.15, 0.20, 0.25, 0.30, 0.35]

  - name: "model_param_uncertainty"
    base_value: 0.0
    variations: [0.0, 0.05, 0.10, 0.15, 0.20]
# 来源: 论文方法部分

# =============================================================================
# 结果保存配置 (来源: 用户设定)
# =============================================================================

# 结果根目录
results_root: "results"
# 来源: 用户设定

# 模型保存目录
model_save_dir: "results/models"
# 来源: 用户设定

# 日志保存目录
log_save_dir: "results/logs"
# 来源: 用户设定

# 图表保存目录
figure_save_dir: "results/figures"
# 来源: 用户设定

# 数据保存目录
data_save_dir: "results/data"
# 来源: 用户设定

# 是否保存详细轨迹
save_detailed_trajectories: true
# 说明: 保存完整的状态-动作-奖励序列
# 来源: 用户设定

# 轨迹保存格式
trajectory_format: "csv"
# 选项: "csv", "npz", "parquet"
# 来源: 用户设定

# =============================================================================
# 基线方法配置 (来源: 论文方法部分 2.5)
# =============================================================================

# 规则控制基线
rule_control:
  light_intensity: 200  # μmol/m²/s
  temp_setpoint: 22  # °C
  co2_setpoint: 1000  # ppm
  vent_rate: 0.25  # 中值
  dehum_rate: 0.001  # 中值
# 来源: 论文方法部分

# MPC基线参数
mpc_baseline:
  prediction_horizon: 24  # 小时
  control_horizon: 1  # 小时
  dt: 3600  # 秒
# 来源: 论文方法部分

# SMPC基线参数
smpc_baseline:
  prediction_horizon: 24  # 小时
  n_scenarios: 10  # 场景数
  uncertainty_level: 0.10  # 参数不确定性水平
# 来源: 论文方法部分

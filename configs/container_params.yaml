# =============================================================================
# 集装箱/植物工厂几何与热力学参数配置文件
# 来源: 基于 PFAL-DRL 项目中的物理模型参数
# =============================================================================

# =============================================================================
# 几何参数 (来源: PFAL-DRL)
# =============================================================================

# 集装箱长度 [m]
c_Length: 12.2
# 来源: PFAL-DRL

# 集装箱宽度 [m]
c_Width: 2.5
# 来源: PFAL-DRL

# 集装箱高度 [m]
c_Height: 3.0
# 来源: PFAL-DRL

# 计算表面积 [m²]
# 公式: 2*(L*W + W*H + L*H) - 地面(已计入栽培面积)
c_surface_area: 143.2
# 来源: PFAL-DRL (自动计算: 2*(12.2*2.5 + 2.5*3.0 + 12.2*3.0))

# 集装箱体积 [m³]
c_volume: 91.5
# 来源: PFAL-DRL (自动计算: L*W*H)

# 总种植面积 [m²]
c_grow_area: 80.0
# 来源: PFAL-DRL

# 总栽培面积 [m²] (育苗区 + 定植区)
# 注: 与PFAL-DRL不同，我们分育苗区和定植区
c_total_plant_area: 40.0
# 说明: 两区总面积固定为40 m² (根据用户设定)

# =============================================================================
# 热力学参数 (来源: PFAL-DRL)
# =============================================================================

# 单位面积等效热容 [J/m²/°C]
# 说明: 空气和结构的热容
c_cap_q: 30000.0
# 来源: PFAL-DRL

# 体积热容 [J/m³/°C]
# 说明: 空气的体积热容
c_cap_q_v: 1290.0
# 来源: PFAL-DRL

# 比热容 [J/kg/°C]
# 说明: 空气的比热容
c_cap_q_p: 1000.0
# 来源: PFAL-DRL

# 墙体传热系数 [W/m²/°C]
# 说明: 集装箱壁面的总传热系数
c_U: 0.3
# 来源: PFAL-DRL

# 汽化潜热 [kJ/kg]
# 说明: 水蒸发潜热
c_lat_water: 2256.4
# 来源: PFAL-DRL

# =============================================================================
# 空气水汽参数 (来源: PFAL-DRL)
# =============================================================================

# 水汽饱和压力常数1 [J/m³]
# 说明: Antoine方程系数
c_v_0: 0.85
# 来源: PFAL-DRL

# 水汽饱和压力常数1 [Pa]
# 说明: Antoine方程系数
c_v_1: 611.0
# 来源: PFAL-DRL

# 水汽饱和压力常数2 [-]
# 说明: Antoine方程系数
c_v_2: 17.4
# 来源: PFAL-DRL

# 水汽饱和压力常数3 [°C]
# 说明: Antoine方程系数
c_v_3: 239.0
# 来源: PFAL-DRL

# 分子量水 [kg/kmol]
mw_water: 18.0
# 来源: PFAL-DRL

# 通用气体常数 [J/K/kmol]
c_R: 8314.0
# 来源: PFAL-DRL

# 绝对零度转换 [K]
c_T_abs: 273.0
# 来源: PFAL-DRL

# =============================================================================
# 植物蒸腾模型参数 (来源: PFAL-DRL)
# =============================================================================

# 蒸腾叶面积系数 [m²/kg]
# 说明: 有效蒸腾面积系数
c_a_pl: 62.8
# 来源: PFAL-DRL

# 气孔-空气水汽流系数 [m/s]
# 说明: 气孔导度相关的蒸腾系数
c_v_pl_ai: 0.0036
# 来源: PFAL-DRL

# =============================================================================
# 外部环境初始条件 (来源: PFAL-DRL)
# =============================================================================

# 夏季外部温度 [°C]
ext_temp_summer: 20.15
# 来源: PFAL-DRL

# 夏季外部相对湿度 [-]
ext_rh_summer: 0.8
# 来源: PFAL-DRL

# 冬季外部温度 [°C]
ext_temp_winter: -4.25
# 来源: PFAL-DRL

# 冬季外部相对湿度 [-]
ext_rh_winter: 0.86
# 来源: PFAL-DRL

# 外部CO2浓度 [ppm]
ext_co2: 400.0
# 来源: PFAL-DRL

# =============================================================================
# 环境约束范围 (来源: PFAL-DRL, 部分调整)
# =============================================================================

# 温度目标值 (白天) [°C]
temp_target_day: 22.0
# 说明: 光期温度设定点
# 来源: PFAL-DRL

# 温度目标值 (夜间) [°C]
temp_target_night: 18.0
# 说明: 暗期温度设定点
# 来源: PFAL-DRL

# 温度范围 (白天) [°C]
temp_range_day: [18.0, 28.0]
# 说明: 白天允许的温度范围
# 来源: 暂定-需调整

# 温度范围 (夜间) [°C]
temp_range_night: [15.0, 25.0]
# 说明: 夜间允许的温度范围
# 来源: 暂定-需调整

# 相对湿度范围 [%]
rh_range: [60.0, 80.0]
# 说明: 允许的相对湿度范围
# 来源: 暂定-需调整

# CO2浓度范围 [ppm]
co2_range: [800.0, 1200.0]
# 说明: 允许的CO2浓度范围
# 来源: PFAL-DRL

# 光周期 [h]
photoperiod_on: 16
# 说明: 每天光照时长
# 来源: PFAL-DRL

photoperiod_off: 8
# 说明: 每天暗期时长
# 来源: PFAL-DRL

# 日累积光量 (DLI) 目标范围 [mol/m²/d]
dli_target_min: 8.0
dli_target_max: 15.0
# 说明: 最佳日累积光量范围
# 来源: 暂定-需调整

# =============================================================================
# 仿真与动力学控制参数 (来源: 本项目)
# =============================================================================

# 光强输入单位标志
# True: 光强输入为 μmol/m²/s (光子通量密度)
# False: 光强输入为 W/m² (PAR能量)
I_in_umol: true

# 环境事件函数阈值
event_temp_hi: 50.0  # 温度上限 [°C]  (超出此温度积分终止)
event_temp_lo: -5.0  # 温度下限 [°C]

# 稳态初始化参数（也供batch_manager使用）
I_standard: 200.0   # 标准光强 [μmol/m²/s]
T_standard: 22.0     # 标准温度 [°C]
C_standard_ppm: 1000.0  # 标准CO2浓度 [ppm]
RH_standard: 0.75    # 标准相对湿度 [-]
disturb_factor_max: 0.05  # 初始扰动因子最大值 (±5%)
seedling_nonstruct_ratio: 0.1  # 幼苗非结构干物质比例
initial_seedling_mass: 0.72e-3  # 幼苗初始总干物质 [kg/m²]

# 环境稳态求解默认值
default_I1: 200.0    # 默认育苗区光强 [μmol/m²/s]
default_I2: 200.0    # 默认定植区光强 [μmol/m²/s]
default_Q_HVAC: 0.0   # 默认HVAC热功率密度 [W/m²]
default_u_CO2: 0.0    # 默认CO2注入速率 [kg/m²/s]
default_V_vent: 0.01  # 默认通风率 [m³/m²/s]
default_m_dehum: 1e-5 # 默认除湿速率 [kg/m²/s]
default_total_E: 1e-4  # 默认总蒸腾速率 [kg water/s]
default_total_P: 1e-6  # 默认总光合速率 [kg CO2/s]

# 观测空间归一化参数
obs_temp_min: 15.0
obs_temp_max: 40.0
obs_co2_min: 300.0
obs_co2_max: 1500.0
obs_out_temp_min: -20.0
obs_out_temp_max: 40.0
obs_out_co2_min: 300.0
obs_out_co2_max: 1500.0
elec_price_min: 0.3
elec_price_max: 1.0

# =============================================================================
# MPC模型专用参数（本文件补充，供mpc_model.py使用）
# =============================================================================

# RH软约束边界 [-]（0.6=60%）
obs_rh_min: 0.6
obs_rh_max: 0.9

# 干物质边界 [kg/m²]
xDn_min: 0.0
xDn_max: 0.5
xDs_min: 0.001
xDs_max: 0.6

# 初始状态（9维MPC用育苗区+定植区分开）
default_C: 7.0e-4     # 默认CO2密度 [kg/m³] ≈ 700 ppm
default_T: 22.0        # 默认温度 [°C]
default_RH: 0.75      # 默认相对湿度 [-]
default_xDn1: 0.005  # 育苗区非结构干物质 [kg/m²]（小苗）
default_xDs1: 0.005  # 育苗区结构干物质 [kg/m²]（小苗）
default_xDn2: 0.05   # 定植区非结构干物质 [kg/m²]（中等苗）
default_xDs2: 0.1    # 定植区结构干物质 [kg/m²]（较大苗）

# 软约束惩罚权重（用于NLP目标函数）
lb_pen_w_CO2: 1.0
lb_pen_w_T: 5.0
lb_pen_w_RH: 2.0
ub_pen_w_CO2: 1.0
ub_pen_w_T: 5.0
ub_pen_w_RH: 2.0

# LED电光转换效率 [-]
c_led_eff: 0.52
# LED光子效率 [μmol/J]
c_optical_eff: 2.5

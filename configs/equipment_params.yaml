# =============================================================================
# 设备参数配置文件
# 来源: 基于 PFAL-DRL 项目中的设备模型参数
# =============================================================================

# =============================================================================
# LED照明参数 (来源: PFAL-DRL)
# =============================================================================

# LED电光转换效率 [-]
# 说明: 电功率转化为光合有效辐射(PAR)的效率
c_led_eff: 0.52
# 来源: PFAL-DRL

# LED光子效率 [μmol/J]
# 说明: 电功率转化为光合光子的总效率
# 计算: c_led_eff * 4.6 μmol/J (典型LED)
c_optical_eff: 2.5
# 说明: 综合电-光子转换效率 (暂定)
# 来源: 暂定-需调整

# 育苗区LED最大功率密度 [W/m²]
# 说明: 育苗区LED的最大安装功率
led_max_power_density_seedling: 200.0
# 来源: 暂定-需调整

# 定植区LED最大功率密度 [W/m²]
# 说明: 定植区LED的最大安装功率
led_max_power_density_transplant: 300.0
# 来源: 暂定-需调整

# =============================================================================
# HVAC参数 (来源: PFAL-DRL)
# =============================================================================

# 热泵性能系数 (COP) [-]
# 说明: 制热量与电功率之比
c_COP: 3.0
# 来源: PFAL-DRL

# 最大加热/制冷功率密度 [W/m²]
# 说明: HVAC单位面积的最大热功率
hvac_max_power_density: 212.0
# 来源: PFAL-DRL

# 最小加热功率密度 [W/m²]（负值表示可以加热）
# 说明: HVAC可以提供加热，负值表示制冷/制热方向
hvac_min_power_density: -212.0
# 来源: 暂定-需调整

# 温度控制死区 [°C]
hvac_deadband: 1.0
# 说明: 温度控制的非灵敏区
# 来源: 暂定-需调整

# =============================================================================
# CO2注入参数 (来源: PFAL-DRL)
# 注意: 动作空间中的CO2注入速率单位为 [g/m²/h]
# 以下参数统一使用 [g/m²/h] 便于与代码动作空间对应

# CO2供给最大速率 [g/m²/h]
# 说明: CO2注入系统的最大供给速率
# 换算: PFAL-DRL原始值 0.5 kg/m²/h = 500 g/m²/h，
# 此处设为较小值作为工作上限
co2_supply_max: 0.5
# 来源: 动作空间工作值（暂定-需调整）

# CO2注入器效率 [kg/kWh]
# 说明: CO2注入的电耗效率
co2_injection_efficiency: 0.5
# 说明: 每kWh电力能注入的CO2质量
# 来源: 暂定-需调整

# CO2成本 [元/kg]
# 说明: CO2气体的单位价格
p_CO2: 0.5
# 来源: 暂定-需调整

# =============================================================================
# 通风参数 (来源: PFAL-DRL)
# =============================================================================

# 通风风机最大容量 [m³/m²/s]
# 说明: 单位面积通风系统的最大风量
c_vent_fan_cap: 0.1042
# 说明: 原PFAL-DRL: 3000/3600/80 ≈ 0.1042 m³/m²/s
# 来源: PFAL-DRL

# 风机效率 [m³/s/kW]
# 说明: 风机单位电功率的风量
fan_eff: 7.07
# 说明: 原PFAL-DRL: 1000*0.00047194745*15 ≈ 7.07 m³/s/kW
# 来源: PFAL-DRL

# 通风控制死区 [ppm]
vent_co2_deadband: 100.0
# 说明: CO2控制时开启通风的阈值
# 来源: 暂定-需调整

# =============================================================================
# 除湿参数 (来源: PFAL-DRL)
# =============================================================================

# 除湿机最大容量 [kg/m²/s]
# 说明: 单位面积除湿系统的最大除湿速率
c_dehum_cap: 2.083E-5
# 说明: 原PFAL-DRL: 6/3600/80 ≈ 2.083E-5 kg/m²/s
# 来源: PFAL-DRL

# 除湿能效比 [kg/kWh]
# 说明: 除湿机单位电功率的除湿量
c_dehum_eev: 3.0
# 来源: PFAL-DRL

# 除湿控制死区 [%RH]
dehum_rh_deadband: 5.0
# 说明: 湿度控制死区
# 来源: 暂定-需调整

# =============================================================================
# 光强边界 [μmol/m²/s]（动作空间边界）
# =============================================================================
I1_min: 0.0
I1_max: 600.0
I2_min: 0.0
I2_max: 600.0

# =============================================================================
# HVAC功率边界 [W/m²]
# =============================================================================
Q_HVAC_min: -212.0
Q_HVAC_max: 212.0

# =============================================================================
# CO2注入边界 [g/m²/h]（g/m²/h转kg/m²/s在代码中处理）
# =============================================================================
co2_supply_min: 0.0
co2_supply_max: 0.5

# =============================================================================
# 通风边界 [m³/m²/s]
# =============================================================================
vent_min: 0.0
vent_max: 0.1042

# =============================================================================
# 除湿边界 [kg/m²/s]
# =============================================================================
dehum_min: 0.0
dehum_max: 2.083E-5

# LED最大光强 [μmol/m²/s]
# 说明: LED灯具的最大输出光强
I_max: 600.0
# 来源: 暂定-需调整

# =============================================================================
# 设备启停参数 (来源: 暂定)
# =============================================================================

# 最小启停时间 [s]
min_on_off_time: 300
# 说明: 设备状态切换的最小间隔
# 来源: 暂定-需调整

# 设备响应时间 [s]
equipment_response_time: 60
# 说明: 设备动作的响应延迟
# 来源: 暂定-需调整

# =============================================================================
# 能耗成本参数 (来源: 暂定)
# =============================================================================

# 基础电价 [元/kWh]
p_elec_base: 0.6
# 说明: 基准电价
# 来源: 暂定-需调整

# 最低电价 [元/kWh]
p_elec_min: 0.3
# 说明: 谷时电价
# 来源: 暂定-需调整

# 最高电价 [元/kWh]
p_elec_max: 1.0
# 说明: 峰时电价
# 来源: 暂定-需调整

# 电价模型类型
# 选项: "constant", "time_of_use", "real_time"
elec_price_model: "time_of_use"
# 来源: 暂定-需调整

# =============================================================================
# 经济参数 (来源: 暂定)
# =============================================================================

# 干物质单价 [元/g]
# 说明: 采收时作物干物质的售价
p_dry_matter: 0.25
# 来源: 暂定-需调整

# 干物质单价 [元/kg]
p_dry_matter_kg: 250.0
# 说明: 便于与RL-SMPC比较的格式
# 来源: 暂定-需调整

# 产品价格 (Lettuce) [元/kg]
# 说明: 采收时生菜鲜重的售价
p_lettuce: 4.44
# 说明: 原PFAL-DRL: 4/0.9 ≈ 4.44 $/kg
# 来源: PFAL-DRL (暂定)

# 人工成本 [元/次]
# 说明: 每次移栽或采收的人工费用
labor_cost: 5.0
# 来源: 暂定-需调整

# CO2价格 [元/kg]
c_CO2: 0.2
# 说明: CO2气体的单位成本
# 来源: PFAL-DRL
